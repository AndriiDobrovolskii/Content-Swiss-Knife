<div class="absolute inset-0 overflow-y-auto p-6 space-y-6 bg-slate-50 dark:bg-slate-900">

  <div>
    <h2 class="text-xl font-bold text-slate-800 dark:text-slate-100 flex items-center gap-2">
      <i class="fa-solid fa-code text-rose-600 dark:text-rose-400"></i>
      {{ t().title }}
    </h2>
    <p class="text-xs text-slate-500 dark:text-slate-400 mt-0.5">{{ t().subtitle }}</p>
  </div>

  @if (!loaded()) {
    <div class="space-y-3 max-w-3xl">
      <label class="block text-xs font-semibold text-slate-700 dark:text-slate-300 uppercase tracking-wider">{{ t().pasteLabel }}</label>
      <textarea
        class="w-full p-3 bg-white dark:bg-slate-800 border border-slate-300 dark:border-slate-700 rounded-lg min-h-[240px] focus:ring-2 focus:ring-rose-500 outline-none resize-y text-sm font-mono text-slate-800 dark:text-slate-200 placeholder:text-slate-400 dark:placeholder:text-slate-500"
        [value]="pastedHtml()"
        (input)="updatePastedHtml($event)"
        [placeholder]="t().pastePlaceholder"></textarea>
      <button
        (click)="load()"
        [disabled]="!pastedHtml().trim()"
        class="py-2.5 px-5 bg-rose-600 hover:bg-rose-700 disabled:bg-slate-300 dark:disabled:bg-slate-700 disabled:cursor-not-allowed text-white font-semibold rounded-lg shadow-sm transition-transform active:scale-[0.98]">
        <i class="fa-solid fa-arrow-right mr-1"></i> {{ t().loadBtn }}
      </button>
    </div>
  } @else {
    <div class="max-w-4xl space-y-4">
      <ckeditor #ckeditorRef [editor]="Editor" [data]="originalHtml()" [config]="config"></ckeditor>

      @if (showIssues()) {
        <div class="p-4 rounded-lg border border-red-200 dark:border-red-800 bg-red-50 dark:bg-red-900/20 text-sm">
          <p class="font-semibold text-red-700 dark:text-red-400 mb-2">{{ t().issuesTitle }}</p>
          <ul class="list-disc list-inside space-y-1 text-red-600 dark:text-red-400">
            @for (issue of issues(); track issue.rule + issue.detail) {
              <li>{{ issue.detail }}</li>
            }
          </ul>
          <button
            (click)="copyAnyway()"
            class="mt-3 py-1.5 px-4 bg-white dark:bg-slate-700 border border-red-300 dark:border-red-700 text-red-700 dark:text-red-400 text-xs font-semibold rounded-lg hover:bg-red-100 dark:hover:bg-red-900/30">
            {{ t().copyAnywayBtn }}
          </button>
        </div>
      }

      <div class="flex gap-2">
        <button
          (click)="copy()"
          class="py-2.5 px-5 bg-rose-600 hover:bg-rose-700 text-white font-semibold rounded-lg shadow-sm transition-transform active:scale-[0.98] flex items-center gap-2">
          <i class="fa-regular fa-copy"></i> {{ copiedFlash() ? t().copied : t().copyBtn }}
        </button>
        <button
          (click)="reset()"
          class="py-2.5 px-5 bg-white dark:bg-slate-700 border border-slate-300 dark:border-slate-600 text-slate-700 dark:text-slate-200 font-semibold rounded-lg shadow-sm">
          {{ t().reloadBtn }}
        </button>
      </div>
    </div>
  }
</div>
